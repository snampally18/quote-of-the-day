<title>Quote of the Day</title>
<link rel="stylesheet" href="style.css?v=10">
</head>
<body>
  <main class="card">
    <h1 class="eyebrow">Quote of the Day</h1>
    <p class="tagline">Take a moment for yourself</p>
    <p class="subtitle">A little motivation and a focus to carry with you today.</p>

    <button id="reveal-btn">What's my quote &amp; focus today?</button>

    <section id="result" class="result hidden">

      <p id="quote-author"></p>
      <div class="focus-pill">
        <span>Today's focus</span>
        <strong id="focus-text"></strong>
      </div>
    </section>
  </main>
